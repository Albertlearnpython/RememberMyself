{% extends "base.html" %}
{% load static %}

{% block body_class %}page page--reader{% endblock %}

{% block content %}
<section class="reader-page" data-epub-reader data-book-url="{{ stream_url }}">
    <header class="reader-toolbar">
        <div class="reader-toolbar__group">
            <a class="button button--secondary" href="{% url 'books:detail' book.pk %}">返回书籍页</a>
            <div class="reader-toolbar__meta">
                <span class="section-label">在线阅读</span>
                <h1>{{ book.title }}</h1>
                <p>{{ asset.file_name }}</p>
            </div>
        </div>
        <div class="reader-toolbar__group reader-toolbar__group--actions">
            <button class="button button--secondary" type="button" data-reader-prev>上一页</button>
            <button class="button button--secondary" type="button" data-reader-next>下一页</button>
            <a class="button button--primary" href="{% url 'books:download_asset' asset.pk %}">下载文件</a>
        </div>
    </header>

    <div class="reader-status" data-reader-status>正在加载 EPUB 阅读器…</div>
    <div class="reader-progress" data-reader-progress>0%</div>
    <div class="epub-viewer" data-reader-viewer></div>
    <p class="reader-hint">如果当前章节没有立即出现，稍等几秒即可；首次打开 EPUB 会先解析目录和资源。</p>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'vendor/jszip.min.js' %}"></script>
<script src="{% static 'vendor/epub.min.js' %}"></script>
<script src="{% static 'site/epub-reader.js' %}"></script>
{% endblock %}
